title: AI Manager
description: Project data explorer -- beads, Jira items, and workspace context
databases:
  ai_manager:
    tables:
      work_items:
        description: Work items from beads and Jira
      documents:
        description: Requirements and other documents attached to work items
      questions:
        description: Open questions associated with work items
      decisions:
        description: Architectural and process decisions for work items
      sessions:
        description: Claude Code transcript sessions cataloged from S3
      session_work_items:
        description: Links between sessions and work items
