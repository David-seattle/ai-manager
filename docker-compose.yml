services:
  app:
    build: ./app
    ports:
      - "${DATASETTE_PORT:-8011}:8001"
    volumes:
      - db-data:/data
      - ${WORKSPACE_PATH:-./_workspace}:/workspace:ro
    env_file:
      - path: .env
        required: false
    environment:
      - CXDB_URL=http://cxdb:80
      - TRANSCRIPT_S3_BUCKET=${TRANSCRIPT_S3_BUCKET:-gastown-transcripts}
      - TRANSCRIPT_S3_REGION=${TRANSCRIPT_S3_REGION:-us-east-2}
    depends_on:
      cxdb:
        condition: service_started

  cxdb:
    image: cxdb/cxdb:latest
    ports:
      - "${CXDB_HTTP_PORT:-9010}:80"
      - "${CXDB_BINARY_PORT:-9009}:9009"
    volumes:
      - cxdb-data:/data

  dashboard:
    build: ./dashboard
    ports:
      - "${DASHBOARD_PORT:-5174}:5173"
    depends_on:
      - app

volumes:
  db-data:
  cxdb-data:
