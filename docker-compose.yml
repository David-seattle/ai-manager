services:
  app:
    build: ./app
    ports:
      - "${DATASETTE_PORT:-8011}:8001"
    volumes:
      - db-data:/data
      - ${WORKSPACE_PATH:-./_workspace}:/workspace:ro
    env_file:
      - path: .env
        required: false

  dashboard:
    build: ./dashboard
    ports:
      - "${DASHBOARD_PORT:-5174}:5173"
    depends_on:
      - app

volumes:
  db-data:
